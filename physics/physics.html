<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Physics | Learn Physics</title>

    <link rel="stylesheet" href="physics.css">

    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Header -->
    <header>

        <div class="logo">
            <i class="fa-solid fa-atom"></i>
            <h2>Physics</h2>
        </div>

        <button id="themeToggle">
            <i class="fa-solid fa-moon"></i>
        </button>

    </header>

    <!-- Hero -->
    <section class="hero">

        <h1>Master Physics</h1>

        <p>
            Complete JEE & WBJEE Physics Notes,
            Concepts, Formulae and Practice Topics
            in one place.
        </p>

    </section>

    <!-- Search -->

    <section class="search-section">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Search Physics Topic..."
            >

        </div>

    </section>

    <!-- Statistics -->

    <section class="stats">

        <div class="glass stat-card">

            <h2 id="topicCount">
                0
            </h2>

            <p>Topics Available</p>

        </div>

    </section>

    <!-- Topics -->

    <main>

        <div id="topicContainer"
             class="topic-grid">

            <!-- JavaScript will generate cards here -->

        </div>

    </main>

    <!-- Floating Button -->

    <button id="scrollTop">

        <i class="fa-solid fa-arrow-up"></i>

    </button>

    <!-- Footer -->

    <footer>

        <h3>Physics Learning Portal</h3>

        <p>
            Learn • Practice • Revise
        </p>

        <p class="copyright">

            © 2026

        </p>

    </footer>

    <script src="physics.js"></script>

</body>
</html>
